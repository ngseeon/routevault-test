<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteVault AI - Pro Dashboard</title>
    <style>
        :root { --primary: #4285F4; --success: #34A853; --error: #e53e3e; --bg: #f8f9fa; --text: #2d3748; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; color: var(--text); }
        .card { background: white; width: 100%; max-width: 440px; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; overflow: hidden; }
        
        /* Header & Nav */
        #header-status { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #edf2f7; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-tabs button { flex: 1; padding: 8px; font-size: 12px; background: #edf2f7; color: #4a5568; }
        .nav-tabs button.active { background: var(--primary); color: white; }

        /* Success Animation */
        #success-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .checkmark { width: 80px; height: 80px; border-radius: 50%; display: block; stroke-width: 2; stroke: var(--success); stroke-miterlimit: 10; box-shadow: inset 0px 0px 0px var(--success); animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both; }
        @keyframes fill { 100% { box-shadow: inset 0px 0px 0px 40px var(--success); } }

        /* Table Style */
        #vault-view { display: none; max-height: 400px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; padding: 8px; background: #f7fafc; }
        td { padding: 8px; border-bottom: 1px solid #edf2f7; }

        /* Rest of existing styles */
        .status-on { color: var(--success); }
        .status-off { color: var(--error); animation: flash 1s infinite; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        .live-clock { text-align: center; font-family: monospace; font-size: 15px; background: #1a202c; padding: 10px; border-radius: 8px; margin-bottom: 20px; color: #cbd5e0; }
        .step { border-left: 3px solid #eee; padding-left: 20px; margin-bottom: 20px; opacity: 0.3; }
        .step.active { border-left-color: var(--primary); opacity: 1; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:disabled { background: #cbd5e0; }
        #log { background: #1a202c; color: #68d391; padding: 10px; border-radius: 8px; font-size: 10px; height: 60px; overflow-y: auto; margin-top: 15px; }
        input { width: 92%; padding: 10px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <div id="success-overlay">
        <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
            <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
            <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8" stroke="#fff" stroke-width="4"/>
        </svg>
        <p style="color:var(--success); font-weight:bold; margin-top:15px;">UPLOAD SECURE</p>
    </div>

    <div id="header-status">
        <div>User: <span id="user-name" style="color:var(--primary); font-weight:bold;">Guest</span></div>
        <div>GPS: <span id="gps-indicator" class="status-off">OFF</span></div>
    </div>

    <div class="nav-tabs">
        <button id="btn-recorder" class="active" onclick="showView('recorder')">Recorder</button>
        <button id="btn-vault" onclick="showView('vault')">Cloud Vault</button>
    </div>

    <div id="recorder-view">
        <div class="live-clock"><span id="display-date"></span> | <span id="display-time"></span></div>
        
        <div id="step1" class="step active">
            <button onclick="handleAuthClick()">Link Google Drive</button>
        </div>
        <div id="step2" class="step">
            <button id="voiceBtn" disabled onclick="startRecording()">Record Voice Proof</button>
        </div>
        <div id="step3" class="step">
            <input type="text" id="pinInput" placeholder="Enter PIN (1234)" disabled>
            <button id="pinBtn" disabled onclick="finalizeUpload()">Finalize & Upload</button>
        </div>
    </div>

    <div id="vault-view">
        <h4 style="margin:0 0 10px 0;">Recent Activity</h4>
        <table id="files-table">
            <thead><tr><th>File Name</th><th>Date</th></tr></thead>
            <tbody id="files-list"><tr><td colspan="2">Loading vault...</td></tr></tbody>
        </table>
    </div>

    <div id="log">> Initializing...</div>
</div>

<script>
    let accessToken = localStorage.getItem('rv_access_token');
    let tokenClient, mediaRecorder, audioChunks, audioBlob;
    let userLocation = "No GPS";
    let gpsActive = false;

    const CLIENT_ID = '337753122620-5u4cn79jvit9k55a94h8u7vsqa74l49f.apps.googleusercontent.com';

    function updateClock() {
        const now = new Date();
        document.getElementById('display-date').innerText = now.toLocaleDateString();
        document.getElementById('display-time').innerText = now.toLocaleTimeString();
    }
    setInterval(updateClock, 1000);

    function log(msg) {
        const l = document.getElementById('log');
        l.innerHTML += `> ${msg}<br>`;
        l.scrollTop = l.scrollHeight;
    }

    function showView(view) {
        document.getElementById('recorder-view').style.display = view === 'recorder' ? 'block' : 'none';
        document.getElementById('vault-view').style.display = view === 'vault' ? 'block' : 'none';
        document.getElementById('btn-recorder').className = view === 'recorder' ? 'active' : '';
        document.getElementById('btn-vault').className = view === 'vault' ? 'active' : '';
        if(view === 'vault') fetchVaultFiles();
    }

    function initClient() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/drive.metadata.readonly',
            callback: (resp) => {
                accessToken = resp.access_token;
                localStorage.setItem('rv_access_token', accessToken);
                onAuthSuccess();
            },
        });
        startGPS();
        if (accessToken) onAuthSuccess();
    }

    async function onAuthSuccess() {
        try {
            const resp = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {headers:{'Authorization':`Bearer ${accessToken}`}});
            const data = await resp.json();
            document.getElementById('user-name').innerText = data.name;
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').classList.add('active');
            document.getElementById('voiceBtn').disabled = false;
        } catch(e) { localStorage.removeItem('rv_access_token'); }
    }

    function startGPS() {
        navigator.geolocation.watchPosition((pos) => {
            userLocation = `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
            document.getElementById('gps-indicator').className = "status-on";
            document.getElementById('gps-indicator').innerText = "ON";
            gpsActive = true;
        });
    }

    async function startRecording() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
            audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step3').classList.add('active');
            document.getElementById('pinInput').disabled = false;
            document.getElementById('pinBtn').disabled = false;
        };
        log("Recording (3s)...");
        mediaRecorder.start();
        setTimeout(() => mediaRecorder.stop(), 3000);
    }

    async function finalizeUpload() {
        if(document.getElementById('pinInput').value !== "1234") return alert("Wrong PIN");
        log("Uploading...");
        const sharedName = `GP_${Date.now()}`;
        await uploadFile(new Blob([`Proof\nLoc:${userLocation}`], {type:'text/plain'}), `Proof_${sharedName}.txt`);
        await uploadFile(audioBlob, `Voice_${sharedName}.webm`);
        
        // Show Success Animation
        const overlay = document.getElementById('success-overlay');
        overlay.style.display = 'flex';
        setTimeout(() => { overlay.style.display = 'none'; location.reload(); }, 2500);
    }

    async function uploadFile(blob, name) {
        const metadata = { name: name, mimeType: blob.type };
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', blob);
        await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + accessToken },
            body: form
        });
    }

    async function fetchVaultFiles() {
        if(!accessToken) return;
        const resp = await fetch('https://www.googleapis.com/drive/v3/files?pageSize=10&fields=files(name,createdTime)', {
            headers: { 'Authorization': 'Bearer ' + accessToken }
        });
        const data = await resp.json();
        const list = document.getElementById('files-list');
        list.innerHTML = data.files.map(f => `<tr><td>${f.name}</td><td>${new Date(f.createdTime).toLocaleDateString()}</td></tr>`).join('');
    }

    function handleAuthClick() { tokenClient.requestAccessToken(); }
</script>
<script src="https://accounts.google.com/gsi/client" onload="initClient()"></script>
</body>
</html>
