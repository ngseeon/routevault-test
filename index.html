<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteVault AI - Pro Dashboard</title>
    <style>
        :root { --primary: #4285F4; --success: #34A853; --error: #e53e3e; --bg: #f8f9fa; --text: #2d3748; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; color: var(--text); }
        
        /* Main Card */
        .card { background: white; width: 100%; max-width: 420px; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; }
        
        /* Top Header & Status */
        #header-status { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #edf2f7; }
        .user-tag { font-weight: bold; color: var(--primary); }
        
        /* GPS Flashing Logic */
        .gps-label { font-weight: bold; }
        .status-on { color: var(--success); }
        .status-off { color: var(--error); animation: flash 1s infinite; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }

        h2 { color: var(--primary); text-align: center; margin: 15px 0; letter-spacing: 1px; }

        /* Clock Display */
        .live-clock { text-align: center; font-family: 'Courier New', Courier, monospace; font-size: 15px; background: #1a202c; padding: 10px; border-radius: 8px; margin-bottom: 20px; color: #cbd5e0; border: 1px solid #2d3748; }
        
        /* Steps Logic */
        .step { border-left: 3px solid #eee; padding-left: 20px; margin-bottom: 25px; opacity: 0.3; transition: 0.4s; }
        .step.active { border-left-color: var(--primary); opacity: 1; }
        
        /* Buttons & Inputs */
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; box-shadow: 0 4px 6px rgba(66, 133, 244, 0.2); }
        button:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); }
        button:disabled { background: #cbd5e0; cursor: not-allowed; box-shadow: none; }
        input { width: 94%; padding: 12px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 16px; text-align: center; }

        /* System Console */
        #log { background: #1a202c; color: #68d391; padding: 12px; border-radius: 8px; font-size: 11px; height: 90px; overflow-y: auto; margin-top: 20px; font-family: monospace; }
    </style>
</head>
<body>

<div class="card">
    <div id="header-status">
        <div>User: <span id="user-name" class="user-tag">Guest</span></div>
        <div>GPS: <span id="gps-indicator" class="status-off">OFF</span></div>
    </div>
    
    <h2>RouteVault AI</h2>

    <div class="live-clock">
        <span id="display-date"></span> | <span id="display-time"></span>
    </div>
    
    <div id="step1" class="step active">
        <p><b>1. Secure Connection</b></p>
        <button id="authBtn" onclick="handleAuthClick()">Link Google Drive</button>
    </div>

    <div id="step2" class="step">
        <p><b>2. Evidence Capture</b></p>
        <button id="voiceBtn" disabled onclick="startRecording()">Hold to Record "Arrived"</button>
    </div>

    <div id="step3" class="step">
        <p><b>3. Finalize Vault</b></p>
        <input type="text" id="pinInput" placeholder="Enter PIN (1234)" disabled>
        <button id="pinBtn" disabled onclick="finalizeUpload()">Seal & Upload Proof</button>
    </div>

    <div id="log">> Booting System...</div>
</div>

<script>
    let accessToken = localStorage.getItem('rv_access_token');
    let tokenClient;
    let mediaRecorder;
    let audioChunks = [];
    let audioBlob;
    let userLocation = "Waiting for GPS...";
    let gpsActive = false;

    // --- CONFIGURATION ---
    const CLIENT_ID = '337753122620-5u4cn79jvit9k55a94h8u7vsqa74l49f.apps.googleusercontent.com'; 
    // ---------------------

    // 1. LIVE CLOCK (Runs immediately)
    function updateClock() {
        const now = new Date();
        document.getElementById('display-date').innerText = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        document.getElementById('display-time').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
    }
    setInterval(updateClock, 1000);
    updateClock();

    function log(msg) {
        const l = document.getElementById('log');
        l.innerHTML += `> ${msg}<br>`;
        l.scrollTop = l.scrollHeight;
    }

    // 2. GPS MONITORING (Auto-runs)
    function startGPSMonitor() {
        const indicator = document.getElementById('gps-indicator');
        navigator.geolocation.watchPosition(
            (pos) => {
                userLocation = `Lat: ${pos.coords.latitude}, Lng: ${pos.coords.longitude}`;
                indicator.innerText = "ON";
                indicator.className = "status-on";
                gpsActive = true;
                if(accessToken) log("GPS Synced.");
            },
            () => {
                indicator.innerText = "OFF";
                indicator.className = "status-off";
                gpsActive = false;
                log("WARNING: Enable GPS.");
            },
            { enableHighAccuracy: true }
        );
    }

    // 3. GOOGLE DRIVE & AUTH
    function initClient() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.profile',
            callback: (resp) => {
                accessToken = resp.access_token;
                localStorage.setItem('rv_access_token', accessToken);
                onAuthSuccess();
            },
        });

        startGPSMonitor();

        if (accessToken) {
            onAuthSuccess();
        } else {
            log("Awaiting Google Connection.");
        }
    }

    async function onAuthSuccess() {
        try {
            const response = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            if (!response.ok) throw new Error("Expired");
            const data = await response.json();
            
            document.getElementById('user-name').innerText = data.name;
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').classList.add('active');
            document.getElementById('voiceBtn').disabled = false;
            log(`Welcome back, ${data.name}`);
        } catch (e) {
            log("Session expired. Please Re-Link.");
            localStorage.removeItem('rv_access_token');
            document.getElementById('step1').style.display = 'block';
        }
    }

    function handleAuthClick() { tokenClient.requestAccessToken(); }

    // 4. RECORDING LOGIC
    async function startRecording() {
        if(!gpsActive) return alert("Please turn on GPS before recording.");
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                log("Voice Proof Captured.");
                document.getElementById('step2').classList.remove('active');
                document.getElementById('step3').classList.add('active');
                document.getElementById('pinInput').disabled = false;
                document.getElementById('pinBtn').disabled = false;
            };
            log("Recording (3s)... Speak 'Arrived'");
            mediaRecorder.start();
            setTimeout(() => mediaRecorder.stop(), 3000);
        } catch (err) {
            log("Microphone Access Denied.");
        }
    }

    // 5. UPLOAD LOGIC
    async function finalizeUpload() {
        const pin = document.getElementById('pinInput').value;
        if(pin !== "1234") return alert("Incorrect PIN");

        log("Encrypting & Uploading...");
        const now = new Date();
        const dateTag = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`;
        const timeTag = `${now.getHours()}-${now.getMinutes()}`;
        const sharedName = `GelangPatah_${dateTag}_${timeTag}`;

        const textContent = `RouteVault AI Proof\nUser: ${document.getElementById('user-name').innerText}\nTime: ${now.toLocaleString()}\nLocation: ${userLocation}\nPIN: ${pin}`;
        
        await uploadFile(new Blob([textContent], {type:'text/plain'}), `Proof_${sharedName}.txt`);
        await uploadFile(audioBlob, `Voice_${sharedName}.webm`);
        
        log("SUCCESS: Cloud Secure.");
        alert("Verification Stored Successfully!");
    }

    async function uploadFile(blob, fileName) {
        const metadata = { name: fileName, mimeType: blob.type };
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', blob);

        await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + accessToken },
            body: form
        });
        log(`Saved: ${fileName}`);
    }
</script>
<script src="https://accounts.google.com/gsi/client" onload="initClient()"></script>
</body>
</html>
