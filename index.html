<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteVault AI - Hybrid</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #075e54; --secondary: #25d366; --bg: #f0f2f5; --text: #111b21; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; color: var(--text); margin: 0; }
        .card { background: white; width: 100%; max-width: 440px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 15px; font-weight: bold; color: var(--primary); }
        .live-clock { text-align: center; font-family: monospace; font-size: 18px; background: #111b21; padding: 10px; border-radius: 8px; margin-bottom: 15px; color: #00ff00; }
        #camera-container { width: 100%; border-radius: 8px; overflow: hidden; background: #000; margin-bottom: 15px; display: none; aspect-ratio: 4/3; }
        #video-preview { width: 100%; height: 100%; object-fit: cover; }
        canvas { display: none; }
        .input-group { margin-bottom: 15px; }
        label { font-size: 11px; color: #667781; display: block; margin-bottom: 4px; }
        input { width: 94%; padding: 12px; border: 1px solid #d1d7db; border-radius: 8px; font-size: 14px; }
        .action-btn { width: 100%; padding: 14px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .share-btn { background: var(--secondary); display: none; margin-top: 10px; text-decoration: none; text-align: center; color: white; line-height: 3; font-weight: bold; border-radius: 8px; }
        #log { background: #e9edef; padding: 10px; border-radius: 8px; font-size: 11px; height: 60px; overflow-y: auto; margin-top: 15px; font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div>📍 Gelang Patah Audit</div>
        <div id="gps-status" style="color:red">GPS: OFF</div>
    </div>

    <div class="live-clock"><span id="display-date"></span> | <span id="display-time"></span></div>

    <div class="input-group">
        <label>RECIPIENT WHATSAPP (e.g. 60123456789)</label>
        <input type="text" id="wa-num" placeholder="Enter Mobile Number">
    </div>

    <div id="camera-container">
        <video id="video-preview" autoplay playsinline></video>
    </div>

    <div id="ui-controls">
        <button id="cameraBtn" class="action-btn" onclick="startCamera()">Open Camera</button>
        <button id="snapBtn" class="action-btn" style="display:none; background:var(--secondary);" onclick="takePhoto()">Stamp Evidence</button>
        
        <div id="final-step" style="display:none;">
            <label id="pin-label" style="font-weight:bold; color:var(--primary);"></label>
            <input type="number" id="pinInput" placeholder="Enter GPS PIN">
            <button class="action-btn" onclick="processLocalSave()">Save & Generate Share</button>
        </div>

        <a id="waShare" class="share-btn" target="_blank">Open WhatsApp & Send Log</a>
    </div>

    <div id="log">System Ready. No Login Required.</div>
</div>

<script>
    let videoStream, imageBlob, userLocation = "Searching...", rawCoords = "";
    
    function log(msg) { document.getElementById('log').innerText += `\n> ${msg}`; }

    window.onload = () => {
        updateTime();
        navigator.geolocation.watchPosition(pos => {
            const lat = pos.coords.latitude.toFixed(4);
            const lng = pos.coords.longitude.toFixed(4);
            userLocation = `Lat: ${lat}, Lng: ${lng}`;
            document.getElementById('gps-status').innerText = "GPS: ON";
            document.getElementById('gps-status').style.color = "green";
            
            // Security PIN calculation
            const pin = (Math.round((pos.coords.latitude % 1) * 10000) + Math.round((pos.coords.longitude % 1) * 10000)).toString();
            window.calculatedPin = pin;
            document.getElementById('pin-label').innerText = `SECURITY PIN: ${pin}`;
        });
    };

    async function startCamera() {
        videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video-preview').srcObject = videoStream;
        document.getElementById('camera-container').style.display = 'block';
        document.getElementById('cameraBtn').style.display = 'none';
        document.getElementById('snapBtn').style.display = 'block';
    }

    async function takePhoto() {
        const video = document.getElementById('video-preview');
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);

        const qrSize = 80;
        const isOdd = (new Date().getDate() % 2 !== 0);
        const qrX = isOdd ? 20 : (canvas.width - 100);
        const qrY = canvas.height - 100;

        const qrDiv = document.createElement("div");
        new QRCode(qrDiv, { text: `Audit: ${Date.now()}\nLoc: ${userLocation}`, width: qrSize, height: qrSize });

        setTimeout(() => {
            ctx.drawImage(qrDiv.querySelector('img'), qrX, qrY, qrSize, qrSize);
            canvas.toBlob(blob => {
                imageBlob = blob;
                videoStream.getTracks().forEach(t => t.stop());
                document.getElementById('camera-container').style.display = 'none';
                document.getElementById('snapBtn').style.display = 'none';
                document.getElementById('final-step').style.display = 'block';
                log("Image Stamped.");
            }, 'image/jpeg', 0.9);
        }, 500);
    }

    function processLocalSave() {
        if (document.getElementById('pinInput').value !== window.calculatedPin) return alert("Wrong PIN.");

        const now = new Date();
        const ts = now.toISOString().replace(/[:.]/g, '-');
        const report = `AUDIT LOG\nTime: ${now.toLocaleString()}\nLoc: ${userLocation}\nPIN: ${window.calculatedPin}`;

        // 1. Download Text Log
        downloadFile(new Blob([report], {type:'text/plain'}), `Log_${ts}.txt`);
        // 2. Download Stamped Image
        downloadFile(imageBlob, `Audit_${ts}.jpg`);

        // 3. Prepare WhatsApp Share
        const waNum = document.getElementById('wa-num').value;
        const encodedMsg = encodeURIComponent(report + "\n(Note: Please attach the Audit Image from your downloads)");
        const waUrl = `https://wa.me/${waNum}?text=${encodedMsg}`;
        
        const shareBtn = document.getElementById('waShare');
        shareBtn.href = waUrl;
        shareBtn.style.display = 'block';
        log("Files saved to device. Ready to share.");
    }

    function downloadFile(blob, name) {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name;
        a.click();
    }

    function updateTime() {
        const n = new Date();
        document.getElementById('display-date').innerText = n.toLocaleDateString();
        document.getElementById('display-time').innerText = n.toLocaleTimeString();
    }
    setInterval(updateTime, 1000);
</script>
</body>
</html>
