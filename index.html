<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteVault AI - Pro Dashboard</title>
    <style>
        :root { --primary: #4285F4; --success: #34A853; --bg: #f8f9fa; --text: #2d3748; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; color: var(--text); }
        .card { background: white; width: 100%; max-width: 420px; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #user-profile { text-align: right; font-size: 12px; margin-bottom: 10px; display: none; padding: 5px; border-bottom: 1px solid #edf2f7; }
        h2 { color: var(--primary); text-align: center; margin-top: 10px; }
        .live-clock { text-align: center; font-family: monospace; font-size: 14px; background: #edf2f7; padding: 8px; border-radius: 8px; margin-bottom: 20px; color: #4a5568; }
        .step { border-left: 3px solid #eee; padding-left: 20px; margin-bottom: 25px; opacity: 0.4; transition: 0.3s; }
        .step.active { border-left-color: var(--primary); opacity: 1; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:hover:not(:disabled) { filter: brightness(1.1); }
        button:disabled { background: #cbd5e0; cursor: not-allowed; }
        #log { background: #1a202c; color: #68d391; padding: 12px; border-radius: 8px; font-size: 11px; height: 100px; overflow-y: auto; margin-top: 20px; border: 1px solid #2d3748; }
        input { width: 94%; padding: 12px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; }
    </style>
</head>
<body>

<div class="card">
    <div id="user-profile">Connected: <span id="user-name" style="font-weight:bold; color:var(--primary);"></span></div>
    
    <h2>RouteVault AI</h2>

    <div class="live-clock">
        <span id="display-date"></span> | <span id="display-time"></span>
    </div>
    
    <div id="step1" class="step active">
        <p><b>1. Digital Vault Connection</b></p>
        <button id="authBtn" onclick="handleAuthClick()">Link Google Drive</button>
    </div>

    <div id="step2" class="step">
        <p><b>2. Voice & GPS Verification</b></p>
        <button id="voiceBtn" disabled onclick="startRecording()">Hold to Record "Arrived"</button>
    </div>

    <div id="step3" class="step">
        <p><b>3. Finalize Handover</b></p>
        <input type="text" id="pinInput" placeholder="Enter 4-digit PIN (1234)" disabled>
        <button id="pinBtn" disabled onclick="finalizeUpload()">Verify & Secure Proof</button>
    </div>

    <div id="log">> System Booting...</div>
</div>

<script>
    let accessToken = localStorage.getItem('rv_access_token');
    let tokenClient;
    let mediaRecorder;
    let audioChunks = [];
    let audioBlob;
    let userLocation = "Waiting for GPS...";

    // --- CONFIGURATION ---
    const CLIENT_ID = '337753122620-5u4cn79jvit9k55a94h8u7vsqa74l49f.apps.googleusercontent.com'; 
    // ---------------------

    // 1. LIVE CLOCK LOGIC
    function updateClock() {
        const now = new Date();
        document.getElementById('display-date').innerText = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        document.getElementById('display-time').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    function log(msg) {
        const l = document.getElementById('log');
        l.innerHTML += `> ${msg}<br>`;
        l.scrollTop = l.scrollHeight;
    }

    // 2. GOOGLE DRIVE & IDENTITY LOGIC
    function initClient() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.profile',
            callback: (resp) => {
                accessToken = resp.access_token;
                localStorage.setItem('rv_access_token', accessToken);
                onAuthSuccess();
            },
        });

        if (accessToken) {
            onAuthSuccess();
        } else {
            log("Ready. Awaiting Connection.");
        }
    }

    async function onAuthSuccess() {
        log("Auth Success.");
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').classList.add('active');
        document.getElementById('voiceBtn').disabled = false;
        
        // Get User Profile Name
        try {
            const response = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            const data = await response.json();
            document.getElementById('user-name').innerText = data.name;
            document.getElementById('user-profile').style.display = 'block';
            log(`Welcome, ${data.name}`);
        } catch (e) {
            log("Session expired. Please re-link.");
            localStorage.removeItem('rv_access_token');
        }
        getGPS();
    }

    function handleAuthClick() { tokenClient.requestAccessToken(); }

    function getGPS() {
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                userLocation = `Lat: ${pos.coords.latitude}, Lng: ${pos.coords.longitude}`;
                log("GPS Locked.");
            },
            () => log("GPS Access Denied.")
        );
    }

    async function startRecording() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                log("Voice Captured.");
                document.getElementById('step2').classList.remove('active');
                document.getElementById('step3').classList.add('active');
                document.getElementById('pinInput').disabled = false;
                document.getElementById('pinBtn').disabled = false;
            };
            log("Recording... Speak now.");
            mediaRecorder.start();
            setTimeout(() => mediaRecorder.stop(), 3000);
        } catch (err) {
            log("Mic Error: " + err);
        }
    }

    async function finalizeUpload() {
        const pin = document.getElementById('pinInput').value;
        if(pin !== "1234") return alert("Invalid PIN");

        log("Syncing to Cloud...");
        const now = new Date();
        const dateTag = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`;
        const timeTag = `${now.getHours()}-${now.getMinutes()}`;
        const sharedName = `GelangPatah_${dateTag}_${timeTag}`;

        const textContent = `RouteVault AI Proof\nUser: ${document.getElementById('user-name').innerText}\nTime: ${now.toLocaleString()}\nLocation: ${userLocation}\nPIN: ${pin}`;
        
        await uploadFile(new Blob([textContent], {type:'text/plain'}), `Proof_${sharedName}.txt`);
        await uploadFile(audioBlob, `Voice_${sharedName}.webm`);
        
        log("SUCCESS: Secure Handover Complete.");
        alert("Upload Successful!");
    }

    async function uploadFile(blob, fileName) {
        const metadata = { name: fileName, mimeType: blob.type };
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', blob);

        await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + accessToken },
            body: form
        });
        log(`Saved: ${fileName}`);
    }
</script>
<script src="https://accounts.google.com/gsi/client" onload="initClient()"></script>
</body>
</html>
