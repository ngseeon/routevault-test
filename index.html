<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Route Stamp v17.6</title>
    <style>
        :root { --blue: #4285F4; --dark: #1a202c; --bg: #f7fafc; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 450px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); min-height: 80vh; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; font-size: 12px; font-weight: bold; }
        #camera-box { width: 100%; background: #000; border-radius: 10px; overflow: hidden; display: none; aspect-ratio: 4/3; margin-bottom: 10px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #preview-img { width: 100%; border-radius: 10px; display: none; border: 1px solid #ddd; margin-bottom: 10px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; background: var(--blue); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        #settings-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; padding: 25px; box-sizing: border-box; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .share-row { display: none; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="settings-panel">
        <h3>User Settings</h3>
        <input type="text" id="in-name" placeholder="Your Name">
        <input type="text" id="in-wa" placeholder="Recipient WhatsApp (e.g. 60123456789)">
        <input type="email" id="in-mail" placeholder="Recipient Email">
        <button class="btn" onclick="saveSettings()">Save & Close</button>
    </div>

    <div class="header">
        <div id="status">📍 GPS: PENDING</div>
        <div onclick="document.getElementById('settings-panel').style.display='block'" style="cursor:pointer; font-size:20px;">⚙️</div>
    </div>

    <div id="camera-box"><video id="v" autoplay playsinline muted></video></div>
    <img id="preview-img">

    <button id="btn-start" class="btn" onclick="openCamera()">Open Audit Camera</button>
    <button id="btn-snap" class="btn" style="display:none; background:var(--dark);" onclick="takeStamp()">Capture & Stamp</button>

    <div id="pin-section" style="display:none; text-align:center; padding: 10px;">
        <p>SECURITY PIN: <span id="pin-code" style="color:var(--blue); font-weight:bold;">----</span></p>
        <input type="number" id="pin-entry" placeholder="Enter PIN to Verify" style="text-align:center; font-size:20px;">
        <button class="btn" onclick="verifyAndSave()">Verify Audit</button>
    </div>

    <div id="share-section" class="share-row">
        <button class="btn" style="background:#25d366" onclick="doShare('wa')">WhatsApp</button>
        <button class="btn" style="background:#EA4335" onclick="doShare('mail')">Email</button>
        <button class="btn" style="background:#718096; grid-column: span 2;" onclick="location.reload()">Start New</button>
    </div>
</div>

<div id="qr-hidden" style="display:none;"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
    let db, videoStream, currentBlob, auditText, currentPin = "0000", gpsText = "N/A";

    // Setup Database
    const req = indexedDB.open("RouteVaultDB", 8);
    req.onsuccess = e => db = e.target.result;
    req.onupgradeneeded = e => e.target.result.createObjectStore("audits", { keyPath: "id" });

    function saveSettings() {
        localStorage.setItem('rs_name', document.getElementById('in-name').value);
        localStorage.setItem('rs_wa', document.getElementById('in-wa').value);
        localStorage.setItem('rs_mail', document.getElementById('in-mail').value);
        document.getElementById('settings-panel').style.display = 'none';
    }

    function openCamera() {
        // Start GPS
        navigator.geolocation.getCurrentPosition(p => {
            const lat = p.coords.latitude, lon = p.coords.longitude;
            gpsText = `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
            currentPin = (Math.round((lat % 1) * 10000) + Math.round((lon % 1) * 10000)).toString();
            document.getElementById('pin-code').innerText = currentPin;
            document.getElementById('status').innerText = "📍 GPS: ACTIVE";
        }, () => alert("Please enable GPS"));

        // Start Video
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
            .then(s => {
                videoStream = s;
                document.getElementById('v').srcObject = s;
                document.getElementById('camera-box').style.display = 'block';
                document.getElementById('btn-start').style.display = 'none';
                document.getElementById('btn-snap').style.display = 'block';
            }).catch(e => alert("Camera error: " + e));
    }

    function takeStamp() {
        const video = document.getElementById('v');
        const qrBox = document.getElementById('qr-hidden');
        const ts = Math.floor(Date.now()/1000);
        const name = localStorage.getItem('rs_name') || "User";
        
        const lines = [
            "📌 ROUTE STAMP",
            `USER: ${name.toUpperCase()}`,
            `PIN: ${currentPin}`,
            `ID: ${ts}`,
            `TIME: ${new Date().toLocaleString()}`,
            `GPS: ${gpsText}`
        ];
        auditText = lines.join('\n');

        qrBox.innerHTML = "";
        if(window.QRCode) { new QRCode(qrBox, { text: auditText, width: 200, height: 200 }); }

        setTimeout(() => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);

            // Stamp Text
            ctx.fillStyle = "white"; ctx.strokeStyle = "black"; ctx.lineWidth = 3;
            ctx.font = "bold 22px Arial";
            lines.forEach((txt, i) => {
                ctx.strokeText(txt, 25, 45 + (i*28));
                ctx.fillText(txt, 25, 45 + (i*28));
            });

            // Stamp QR
            const qrCanvas = qrBox.querySelector('canvas');
            if(qrCanvas) ctx.drawImage(qrCanvas, canvas.width-190, canvas.height-190, 160, 160);

            canvas.toBlob(b => {
                currentBlob = b;
                document.getElementById('preview-img').src = URL.createObjectURL(b);
                document.getElementById('preview-img').style.display = 'block';
                document.getElementById('camera-box').style.display = 'none';
                document.getElementById('btn-snap').style.display = 'none';
                document.getElementById('pin-section').style.display = 'block';
                videoStream.getTracks().forEach(t => t.stop());
            }, 'image/jpeg', 0.8);
        }, 600);
    }

    function verifyAndSave() {
        if(document.getElementById('pin-entry').value !== currentPin) return alert("PIN Incorrect");
        const tx = db.transaction("audits", "readwrite");
        tx.objectStore("audits").add({ id: Math.floor(Date.now()/1000), text: auditText, img: currentBlob });
        document.getElementById('pin-section').style.display = 'none';
        document.getElementById('share-section').style.display = 'grid';
    }

    function doShare(mode) {
        const text = encodeURIComponent(auditText);
        if(mode === 'wa') {
            const num = (localStorage.getItem('rs_wa') || "").replace(/\D/g,'');
            window.open(`https://wa.me/${num}?text=${text}`);
        } else {
            const mail = localStorage.getItem('rs_mail') || "";
            window.open(`mailto:${mail}?subject=RouteAudit&body=${text}`);
        }
    }

    window.onload = () => {
        document.getElementById('in-name').value = localStorage.getItem('rs_name') || "";
        document.getElementById('in-wa').value = localStorage.getItem('rs_wa') || "";
        document.getElementById('in-mail').value = localStorage.getItem('rs_mail') || "";
    };
</script>
</body>
</html>
