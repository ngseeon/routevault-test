<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteVault AI - Pro</title>
    <style>
        :root { --primary: #4285F4; --success: #34A853; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 420px; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); text-align: center; }
        .step { border-left: 3px solid #eee; padding-left: 20px; margin-bottom: 30px; opacity: 0.5; transition: 0.3s; }
        .step.active { border-left-color: var(--primary); opacity: 1; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:disabled { background: #ccc; }
        #log { background: #1a202c; color: #68d391; padding: 10px; border-radius: 8px; font-size: 11px; height: 100px; overflow-y: auto; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>RouteVault AI</h2>
    
    <div id="step1" class="step active">
        <p><b>1. Connection</b></p>
        <button onclick="handleAuthClick()">Link Google Drive</button>
    </div>

    <div id="step2" class="step">
        <p><b>2. Voice & GPS Record</b></p>
        <button id="voiceBtn" disabled onclick="startRecording()">Hold to Record "Arrived"</button>
    </div>

    <div id="step3" class="step">
        <p><b>3. Finalize</b></p>
        <input type="text" id="pinInput" placeholder="Enter PIN (1234)" style="width:90%; padding:10px; margin:10px 0;" disabled>
        <button id="pinBtn" disabled onclick="finalizeUpload()">Verify & Upload All</button>
    </div>

    <div id="log">> System Initializing...</div>
</div>

<script>
    let accessToken = null;
    let tokenClient;
    let mediaRecorder;
    let audioChunks = [];
    let audioBlob;
    let userLocation = "Location Access Denied";

    // --- CONFIGURATION ---
    const CLIENT_ID = '337753122620-5u4cn79jvit9k55a94h8u7vsqa74l49f.apps.googleusercontent.com'; 
    // ---------------------

    function log(msg) {
        const l = document.getElementById('log');
        l.innerHTML += `> ${msg}<br>`;
        l.scrollTop = l.scrollHeight;
    }

    function initClient() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/drive.file',
            callback: (resp) => {
                accessToken = resp.access_token;
                log("Drive Linked.");
                document.getElementById('step1').classList.remove('active');
                document.getElementById('step2').classList.add('active');
                document.getElementById('voiceBtn').disabled = false;
                getGPS();
            },
        });
        log("System Ready.");
    }

    function handleAuthClick() { tokenClient.requestAccessToken(); }

    function getGPS() {
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                userLocation = `Lat: ${pos.coords.latitude}, Lng: ${pos.coords.longitude}`;
                log("GPS Locked.");
            },
            () => log("GPS Failed. Check permissions.")
        );
    }

    async function startRecording() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
            audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            log("Voice Recorded.");
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step3').classList.add('active');
            document.getElementById('pinInput').disabled = false;
            document.getElementById('pinBtn').disabled = false;
        };

        log("Recording... Say 'Arrived'");
        mediaRecorder.start();
        setTimeout(() => mediaRecorder.stop(), 3000); // Records for 3 seconds
    }

    async function finalizeUpload() {
        const pin = document.getElementById('pinInput').value;
        if(pin !== "1234") return alert("Wrong PIN");

        log("Uploading Proof & Audio...");
        
        // 1. Upload Text Proof (with GPS)
        const textContent = `RouteVault AI Proof\nTime: ${new Date().toLocaleString()}\nLocation: ${userLocation}\nPIN: ${pin}`;
        await uploadFile(new Blob([textContent], {type:'text/plain'}), `Proof_${Date.now()}.txt`);

        // 2. Upload Audio File
        await uploadFile(audioBlob, `Voice_${Date.now()}.webm`);
        
        alert("Success! Check Google Drive for 2 new files.");
    }

    async function uploadFile(blob, fileName) {
        const metadata = { name: fileName, mimeType: blob.type };
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', blob);

        await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + accessToken },
            body: form
        });
        log(`Uploaded: ${fileName}`);
    }
</script>
<script src="https://accounts.google.com/gsi/client" onload="initClient()"></script>
</body>
</html>
