<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteVault AI - Master Audit</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #4285F4; --success: #34A853; --error: #e53e3e; --bg: #f8f9fa; --text: #2d3748; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; color: var(--text); }
        .card { background: white; width: 100%; max-width: 440px; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; }
        #header-status { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #edf2f7; }
        .user-tag { font-weight: bold; color: var(--primary); }
        .status-on { color: var(--success); font-weight: bold; }
        .status-off { color: var(--error); font-weight: bold; }
        .live-clock { text-align: center; font-family: monospace; font-size: 16px; background: #1a202c; padding: 12px; border-radius: 8px; margin-bottom: 20px; color: #cbd5e0; }
        #camera-container { width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 15px; display: none; aspect-ratio: 4/3; }
        #video-preview { width: 100%; height: 100%; object-fit: cover; }
        #photo-canvas { display: none; }
        .step { border-left: 3px solid #eee; padding-left: 20px; margin-bottom: 25px; opacity: 0.3; transition: 0.4s; }
        .step.active { border-left-color: var(--primary); opacity: 1; }
        button.action-btn { width: 100%; padding: 14px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
        button:disabled { background: #cbd5e0 !important; cursor: not-allowed; }
        input { width: 92%; padding: 12px; margin: 5px 0 15px 0; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 18px; text-align: center; }
        #log { background: #1a202c; color: #68d391; padding: 12px; border-radius: 8px; font-size: 10px; height: 100px; overflow-y: auto; margin-top: 15px; font-family: monospace; }
    </style>
</head>
<body>

<div class="card">
    <div id="header-status">
        <div>User: <span id="user-name" class="user-tag">Pending...</span></div>
        <div>GPS: <span id="gps-indicator" class="status-off">OFF</span></div>
    </div>
    <div class="live-clock"><span id="display-date"></span> | <span id="display-time"></span></div>
    <div id="camera-container"><video id="video-preview" autoplay playsinline></video></div>
    <canvas id="photo-canvas"></canvas>

    <div id="step1" class="step active">
        <p><b>1. Connection</b></p>
        <button id="authBtn" class="action-btn" onclick="handleAuthClick()">Checking Google...</button>
    </div>
    <div id="step2" class="step"><p><b>2. Evidence</b></p><button id="cameraBtn" class="action-btn" disabled onclick="toggleCamera()">Open Camera</button></div>
    <div id="step3" class="step"><p><b>3. Handover Audit</b></p><input type="number" id="pinInput" placeholder="ENTER PIN" disabled><button id="pinBtn" class="action-btn" disabled onclick="finalizeUpload()">Upload</button></div>
    <div id="log">> Booting...<br></div>
</div>

<script>
    let accessToken = null;
    let tokenClient, videoStream, imageBlob;
    const CLIENT_ID = '337753122620-5u4cn79jvit9k55a94h8u7vsqa74l49f.apps.googleusercontent.com';

    function log(msg) {
        const l = document.getElementById('log');
        l.innerHTML += `> ${msg}<br>`;
        l.scrollTop = l.scrollHeight;
    }

    // NEW: Auto-retry logic for Google SDK
    function tryInit() {
        if (typeof google !== 'undefined' && google.accounts) {
            log("Google SDK Found.");
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email',
                prompt: 'consent', 
                callback: (resp) => {
                    if (resp.access_token) {
                        accessToken = resp.access_token;
                        log("Access Granted.");
                        validateUser();
                    }
                },
            });
            document.getElementById('authBtn').innerText = "Link Google Account";
        } else {
            log("Waiting for Google SDK...");
            setTimeout(tryInit, 1000); // Try again in 1 second
        }
    }

    window.onload = () => {
        tryInit();
        updateTime();
        startGPS();
    };

    function handleAuthClick() {
        if (tokenClient) tokenClient.requestAccessToken();
        else log("SDK not ready yet.");
    }

    async function validateUser() {
        const resp = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
            headers: {'Authorization': `Bearer ${accessToken}`}
        });
        const data = await resp.json();
        const email = data.email || "Unknown User";
        document.getElementById('user-name').innerText = email;
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').classList.add('active');
        document.getElementById('cameraBtn').disabled = false;
        log(`Linked to: ${email}`);
    }

    function startGPS() {
        navigator.geolocation.watchPosition((pos) => {
            document.getElementById('gps-indicator').className = "status-on";
            document.getElementById('gps-indicator').innerText = "ON";
        }, () => { log("GPS Denied."); });
    }

    async function toggleCamera() {
        videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video-preview').srcObject = videoStream;
        document.getElementById('camera-container').style.display = 'block';
        log("Camera Active.");
    }

    function updateTime() {
        const n = new Date();
        document.getElementById('display-date').innerText = n.toLocaleDateString();
        document.getElementById('display-time').innerText = n.toLocaleTimeString();
    }
    setInterval(updateTime, 1000);
</script>
</body>
</html>
