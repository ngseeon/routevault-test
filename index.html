<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SiteVerify - Professional V17.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { 
            --primary-red: #ff0000; 
            --brand-grey: #737373;
            --light-bg: #f8f9fa; 
            --wa-green: #25d366;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--light-bg); display: flex; justify-content: center; padding: 10px; margin: 0; color: var(--brand-grey); overflow-x: hidden; }
        .card { background: white; width: 100%; max-width: 460px; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; min-height: 95vh; border: 1px solid #e2e8f0; box-sizing: border-box; display: flex; flex-direction: column; }
        
        /* Integrated Official SVG Logo */
        .logo-container { text-align: center; margin-bottom: 10px; padding: 10px 0; }
        .logo-svg { width: 100%; max-width: 320px; height: auto; }

        .header { display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #edf2f7; padding-bottom: 10px; align-items: center; }
        
        .nav-menu { display: flex; gap: 8px; margin-bottom: 20px; }
        .nav-btn { flex: 1; padding: 12px; border-radius: 8px; border: 2px solid var(--brand-grey); background: white; cursor: pointer; font-weight: bold; font-size: 13px; color: var(--brand-grey); transition: 0.3s; }
        .nav-btn.active { background: var(--brand-grey); color: white; }
        .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .live-clock { text-align: center; font-family: monospace; font-size: 18px; background: #f1f5f9; padding: 12px; border-radius: 8px; margin-bottom: 15px; color: var(--primary-red); border: 1px solid #cbd5e0; }
        
        #camera-container { width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 10px; display: none; aspect-ratio: 4/3; border: 3px solid var(--brand-grey); }
        #video-preview { width: 100%; height: 100%; object-fit: cover; }
        
        .action-btn { width: 100%; padding: 14px; border: none; border-radius: 8px; background: var(--primary-red); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; text-transform: uppercase; }
        .action-btn.grey { background: var(--brand-grey); }

        /* Perfect Share Row Alignment */
        .share-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; width: 100%; }
        .share-row .action-btn { margin-top: 0; height: 50px; }

        .log-container { flex-grow: 1; overflow-y: auto; border: 1px solid #edf2f7; border-radius: 12px; }
        .log-item { padding: 15px; border-bottom: 1px solid #edf2f7; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: #fff; }
        
        input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 14px; margin-bottom: 15px; display: block; box-sizing: border-box; }
        
        .review-details { background: #f8fafc; padding: 12px; border-radius: 8px; font-size: 12px; margin-bottom: 10px; border-left: 5px solid var(--primary-red); line-height: 1.6; }
        
        #settings-ui { display: none; background: #fff; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; padding: 20px; box-sizing: border-box; border-radius: 16px; overflow-y: auto;}
    </style>
</head>
<body>

<div id="qr-hidden" style="position:absolute; left:-9999px;"></div>

<div class="card">
    <div class="logo-container">
        <svg class="logo-svg" viewBox="0 0 1018 410" xmlns="http://www.w3.org/2000/svg">

          <path d="M518,44.1l111.9,210.4l111.9-210.4" fill="none" stroke="#737373" stroke-width="30" stroke-linejoin="miter"/>
          <path d="M629.9,104.1l-40,60h80Z" fill="#ff0000"/>

        </svg>
    </div>

    <div id="settings-ui">
        <h3 style="color:var(--primary-red)">System Settings</h3>
        <label>User Name</label><input type="text" id="set-u-name">
        <label>Recipient Email</label><input type="email" id="set-r-email">
        <label>Recipient Phone (60...)</label><input type="text" id="set-r-phone">
        <button class="action-btn" onclick="saveSettings()">Save & Close</button>
    </div>

    <div class="header">
        <div id="location-name">📍 DETECTING SITE...</div>
        <div style="display:flex; gap:10px; align-items:center;">
            <span id="gps-status" style="color:var(--primary-red)">GPS: OFF</span>
            <span onclick="toggleSettings()" style="cursor:pointer; font-size:18px;">⚙️</span>
        </div>
    </div>

    <div class="nav-menu" id="main-nav">
        <button id="btn-nav-new" class="nav-btn active" onclick="switchSection('new')">New Capture</button>
        <button id="btn-nav-resend" class="nav-btn" onclick="switchSection('resend')">Verify History</button>
    </div>

    <div id="sec-new" class="section active">
        <div id="capture-ui-stack">
            <div class="live-clock"><span id="display-date"></span> | <span id="display-time"></span></div>
            <div id="camera-container"><video id="video-preview" autoplay playsinline></video></div>
            <img id="pin-view-img" style="display:none; width:100%; border-radius:12px; margin-bottom:10px; border:2px solid var(--brand-grey);">
            <button id="cameraBtn" class="action-btn" onclick="startCamera()">Open Site Camera</button>
            <button id="snapBtn" class="action-btn grey" style="display:none;" onclick="takePhoto()">Capture & Stamp</button>
            
            <div id="pin-step" style="display:none; text-align:center;">
                <p style="font-size:11px; font-weight:bold;">SECURITY PIN: <span id="pin-display" style="color:var(--primary-red);">--</span></p>
                <input type="number" id="pinInput" placeholder="ENTER PIN" style="font-size:24px; text-align:center; width:180px; margin: 10px auto; border-color:var(--primary-red);">
                <button class="action-btn" onclick="verifyPin()">Verify & Lock Data</button>
            </div>
        </div>

        <div id="post-verify-step" style="display:none;">
            <img id="final-view-img" style="width:100%; border-radius:12px; margin-bottom:10px; border:2px solid var(--brand-grey);">
            <div class="share-row">
                <button onclick="shareWhatsApp()" class="action-btn" style="background:var(--wa-green);">WhatsApp</button>
                <button onclick="handleEmailShare()" class="action-btn">Gmail Web</button>
            </div>
            <button class="action-btn grey" onclick="resetToNew()">New Capture</button>
        </div>
    </div>

    <div id="sec-resend" class="section">
        <div class="log-container" id="log-list"></div>
    </div>

    <div id="review-screen" style="display:none;">
        <img id="review-img" src="" style="width:100%; border-radius:12px; margin-bottom:10px;">
        <div class="review-details" id="review-data-text"></div>
        <div class="share-row">
            <button onclick="shareWhatsApp()" class="action-btn" style="background:var(--wa-green);">WhatsApp</button>
            <button onclick="handleEmailShare()" class="action-btn">Gmail Web</button>
        </div>
        <button class="action-btn" style="background:var(--brand-grey);" onclick="deleteRecord()">Delete Record</button>
        <button class="action-btn grey" onclick="closeReview()">Back to History</button>
    </div>
</div>

<script>
    const DB_NAME = "SITEVERIFY_DB_V17"; 
    let db = null, videoStream, imageBlob, userLocation = "N/A", currentArea = "DETECTING...", unixTs = 0, isCapturing = false;
    let currentRecordId = null, baseBodyText = "";
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    async function fetchIP() {
        try {
            const r = await fetch('https://api.ipify.org?format=json', { signal: AbortSignal.timeout(2000) });
            const d = await r.json(); return d.ip;
        } catch (e) { return "LAN-ACTIVE"; }
    }

    function getDB() {
        return new Promise((res) => {
            const req = indexedDB.open(DB_NAME, 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore("captures", { keyPath: "id" });
            req.onsuccess = e => { db = e.target.result; res(db); };
        });
    }

    function clearUI() {
        document.getElementById('pin-view-img').src = "";
        document.getElementById('final-view-img').src = "";
        document.getElementById('review-img').src = "";
        if(videoStream) videoStream.getTracks().forEach(t => t.stop());
        document.getElementById('camera-container').style.display = 'none';
        isCapturing = false;
        document.getElementById('btn-nav-resend').disabled = false;
    }

    async function switchSection(sect) {
        if(isCapturing && sect === 'resend') return; 
        clearUI();
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('review-screen').style.display = 'none';
        
        if(sect === 'new') {
            document.getElementById('sec-new').classList.add('active');
            document.getElementById('btn-nav-new').classList.add('active');
            resetToNew();
        } else {
            document.getElementById('sec-resend').classList.add('active');
            document.getElementById('btn-nav-resend').classList.add('active');
            loadLogList();
        }
    }

    async function startCamera() {
        try {
            isCapturing = true;
            document.getElementById('btn-nav-resend').disabled = true;
            videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('video-preview').srcObject = videoStream;
            document.getElementById('camera-container').style.display = 'block';
            document.getElementById('cameraBtn').style.display = 'none';
            document.getElementById('snapBtn').style.display = 'block';
        } catch (e) { alert("Camera Permission Required"); isCapturing = false; document.getElementById('btn-nav-resend').disabled = false; }
    }

    async function takePhoto() {
        const video = document.getElementById('video-preview');
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        
        unixTs = Math.floor(Date.now() / 1000);
        const ip = await fetchIP();
        const dev = `WEB-${window.screen.width}-${navigator.platform.substring(0,4).toUpperCase()}`;
        
        baseBodyText = `Verify Report\nUser: ${localStorage.getItem('rv_u_name') || "Site-Field"}\nPIN: ${window.calculatedPin}\nTS: ${unixTs}\nLOC: ${currentArea}\nGPS: ${userLocation}\n< IP: ${ip} | ID: ${dev}`;
        
        const qrDiv = document.getElementById('qr-hidden');
        qrDiv.innerHTML = "";
        new QRCode(qrDiv, { text: baseBodyText, width: 256, height: 256 });
        
        setTimeout(() => {
            const qrS = Math.floor(canvas.width * 0.28); 
            ctx.drawImage(qrDiv.querySelector('canvas'), canvas.width - qrS - 20, canvas.height - qrS - 20, qrS, qrS);
            canvas.toBlob(blob => {
                imageBlob = blob;
                if(videoStream) videoStream.getTracks().forEach(t => t.stop());
                document.getElementById('camera-container').style.display = 'none';
                document.getElementById('snapBtn').style.display = 'none';
                document.getElementById('pin-view-img').src = URL.createObjectURL(blob);
                document.getElementById('pin-view-img').style.display = 'block';
                document.getElementById('pin-step').style.display = 'block';
            }, 'image/jpeg', 0.9);
        }, 400);
    }

    async function verifyPin() {
        if (document.getElementById('pinInput').value !== window.calculatedPin) return alert("Security PIN Error");
        document.getElementById('capture-ui-stack').style.display = 'none';
        document.getElementById('post-verify-step').style.display = 'block';
        document.getElementById('final-view-img').src = URL.createObjectURL(imageBlob);
        
        const rec = { id: `Verify_${unixTs}`, date: new Date().toLocaleDateString(), time: new Date().toLocaleTimeString(), blob: imageBlob, body: baseBodyText };
        const localDb = await getDB();
        localDb.transaction("captures", "readwrite").objectStore("captures").put(rec);
        isCapturing = false;
        document.getElementById('btn-nav-resend').disabled = false;
    }

    async function shareWhatsApp() {
        const phone = (localStorage.getItem('rv_r_phone') || "").replace(/\D/g,'');
        const ip = await fetchIP();
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(baseBodyText + "\n> IP: " + ip)}`, '_blank');
    }

    async function handleEmailShare() {
        const email = localStorage.getItem('rv_r_email') || "";
        const ip = await fetchIP();
        const text = baseBodyText + `\n> IP: ${ip}`;
        const sub = `VerifyStamp_${unixTs}`;
        if(isMobile) window.location.assign(`mailto:${email}?subject=${sub}&body=${encodeURIComponent(text)}`);
        else window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=${email}&su=${sub}&body=${encodeURIComponent(text)}`, '_blank');
    }

    function resetToNew() {
        clearUI();
        document.getElementById('capture-ui-stack').style.display = 'block';
        document.getElementById('post-verify-step').style.display = 'none';
        document.getElementById('pin-step').style.display = 'none';
        document.getElementById('pin-view-img').style.display = 'none';
        document.getElementById('cameraBtn').style.display = 'block';
        document.getElementById('snapBtn').style.display = 'none';
        document.getElementById('pinInput').value = "";
    }

    async function loadLogList() {
        const listDiv = document.getElementById('log-list');
        listDiv.innerHTML = "<p style='padding:20px;'>Syncing Verify History...</p>";
        const localDb = await getDB();
        localDb.transaction("captures").objectStore("captures").getAll().onsuccess = e => {
            const data = e.target.result;
            listDiv.innerHTML = data.length ? "" : "<p style='padding:20px;'>History Empty.</p>";
            data.reverse().forEach(item => {
                const row = document.createElement('div');
                row.className = 'log-item';
                row.onclick = () => showReview(item);
                row.innerHTML = `<div><b>${item.id}</b><br><small>${item.date} ${item.time}</small></div><span style="color:var(--primary-red)">➔</span>`;
                listDiv.appendChild(row);
            });
        };
    }

    function showReview(item) {
        clearUI();
        currentRecordId = item.id; 
        baseBodyText = item.body;
        document.getElementById('review-img').src = URL.createObjectURL(item.blob);
        document.getElementById('review-data-text').innerHTML = `<b>Verify ID:</b> ${item.id}<br><b>Logged:</b> ${item.date} ${item.time}`;
        document.getElementById('sec-new').classList.remove('active');
        document.getElementById('sec-resend').classList.remove('active');
        document.getElementById('review-screen').style.display = 'block';
    }

    async function deleteRecord() {
        if(confirm("Permanently delete Verify record?")) {
            const localDb = await getDB();
            localDb.transaction("captures", "readwrite").objectStore("captures").delete(currentRecordId).onsuccess = () => switchSection('resend');
        }
    }

    function closeReview() { switchSection('resend'); }
    function toggleSettings() { document.getElementById('settings-ui').style.display = 'block'; }
    function saveSettings() {
        localStorage.setItem('rv_u_name', document.getElementById('set-u-name').value);
        localStorage.setItem('rv_r_email', document.getElementById('set-r-email').value);
        localStorage.setItem('rv_r_phone', document.getElementById('set-r-phone').value);
        document.getElementById('settings-ui').style.display = 'none';
    }

    window.onload = () => {
        document.getElementById('set-u-name').value = localStorage.getItem('rv_u_name') || "";
        document.getElementById('set-r-email').value = localStorage.getItem('rv_r_email') || "";
        document.getElementById('set-r-phone').value = localStorage.getItem('rv_r_phone') || "";
        setInterval(() => {
            const n = new Date();
            document.getElementById('display-date').innerText = n.toLocaleDateString();
            document.getElementById('display-time').innerText = n.toLocaleTimeString();
        }, 1000);
        navigator.geolocation.watchPosition(pos => {
            const lat = pos.coords.latitude, lng = pos.coords.longitude;
            userLocation = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
            document.getElementById('gps-status').innerText = "GPS: ACTIVE";
            window.calculatedPin = (Math.round((lat % 1) * 10000) + Math.round((lng % 1) * 10000)).toString();
            document.getElementById('pin-display').innerText = window.calculatedPin;
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`).then(r => r.json()).then(d => {
                currentArea = d.address.suburb || d.address.town || d.address.city || "Site Spot";
                document.getElementById('location-name').innerText = `📍 ${currentArea.toUpperCase()}`;
            });
        }, null, { enableHighAccuracy: true });
    };
</script>
</body>
</html>
